<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Mahfazati - محفظتي</title>
  </head>
  <body>
    <header class="app-header">
      <nav class="nav-bar">
        <div class="logo">
          <img
            src="./assets/logo.png"
            alt="Mahfazati Logo"
            class="logo-image"
          />
          <span class="logo-text">محفظتي</span>
        </div>
        <ul class="links">
          <li class="link active-link"><a href="">الرئيسية</a></li>
          <li class="link"><a href="">المميزات</a></li>
          <li class="link"><a href="">الامان</a></li>
          <li class="link"><a href="">الاسئلة الشائعة</a></li>
        </ul>
        <button class="download-btn">حمل التطبيق الأن</button>
      </nav>
    </header>
    <main class="app-main">
      <section class="hero-section">
        <div class="hero-content">
          <h1 class="hero-title">محفظتك الرقمية الذكية أينما كنت.</h1>
          <p class="hero-description">
            أدر أموالك، أرسل واستلم، واستثمر، كل ذلك في مكان واحد ومن جوالك
            وبأمان تام.
          </p>
          <div class="download-btns">
            <a href="#" class="download-link">
              <img src="./assets/appStore.png" alt="تحميل من App Store" />
            </a>
            <a href="#" class="download-link">
              <img src="./assets/playStore.png" alt="تحميل من Google Play" />
            </a>
          </div>
        </div>

        <div class="hero-image">
          <img src="./assets/mobiles.png" alt="صورة الهواتف الذكية" />
        </div>
      </section>
    </main>
  </body>
</html>
